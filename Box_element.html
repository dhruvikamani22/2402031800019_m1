<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Box Example</title>
    <style>
        .box-container {
            width: 300px;
            padding: 20px;
            margin: 50px auto; 
            background-color: #e3f2fd;
            border: 3px solid #2196f3;
            border-radius: 8px; 
            font-family: Arial, sans-serif;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="box-container">
        <h2>Box Element</h2>
        <p>This is a complete HTML document showing a styled box container.</p>
    </div>

</body>
</html>
